# Training configuration for QLoRA fine-tuning of Qwen2.5-VL-7B
# on Singapore nadir aerial imagery.

model:
  base_model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
  adapter_id: "kaihon/sg-aerial-scene-analyser-lora"
  min_pixels: 200704    # 256 * 28 * 28
  max_pixels: 1003520   # 1280 * 28 * 28

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"

training:
  num_epochs: 10
  batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 7
  max_seq_length: 2048
  early_stopping_patience: 3
  bf16: true
  gradient_checkpointing: true

data:
  annotations_file: "data/annotations.jsonl"
  test_split_file: "data/test_split.jsonl"
  image_dir: "images/nadir"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
